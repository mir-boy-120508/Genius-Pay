<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius Pay</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* スマホの画面サイズを意識したコンテナ */
        .app-container {
            width: 100%;
            max-width: 414px; /* iPhone Plusサイズ */
            height: 100%;
            max-height: 896px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .header {
            background-color: #ff3366;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .balance-card {
            background: linear-gradient(135deg, #ff3366, #ff6633);
            color: white;
            width: 80%;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
        }
        .balance-amount {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 10px;
        }
        .pay-btn {
            background-color: #ff3366;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .pay-btn:active {
            transform: scale(0.95);
        }
        /* 支払いモーダル（隠し画面） */
        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .barcode {
            width: 80%;
            height: 100px;
            background: repeating-linear-gradient(90deg, #000, #000 4px, #fff 4px, #fff 8px);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">Genius Pay</div>
    
    <div class="main-content">
        <div class="balance-card">
            <div>残高</div>
            <div class="balance-amount">¥1,000,000,000,000</div>
        </div>
        <button class="pay-btn" onclick="openPay()">コード支払い</button>
    </div>

    <div id="payModal" class="modal">
        <h3>店員さんに読み取ってもらおう</h3>
        <div class="barcode"></div>
        <p>※デモ画面です</p>
        <button class="pay-btn" style="background-color: #666;" onclick="closePay()">戻る</button>
    </div>
</div>

<script>
    // 最初に Audio を作らず、ボタンが押された瞬間に作るようにします
    function openPay() {
        document.getElementById('payModal').style.display = 'flex';
        
        try {
            // ボタンが押されたこの瞬間に音源を読み込む（Safari対策）
            const paySound = new Audio('song.mp3');
            
            // 読み込みと同時に再生
            paySound.play()
            .then(() => {
                console.log("再生成功！");
            })
            .catch(error => {
                alert("エラー発生: " + error.name + "\nメッセージ: " + error.message);
            });
        } catch (e) {
            alert("オーディオ作成失敗: " + e.message);
        }
    }

    function closePay() {
        document.getElementById('payModal').style.display = 'none';
    }
</script>
</body>
</html>
